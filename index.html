<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Minecraft Server</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    padding:60px 20px;
}

h1{
    font-size:48px;
}

.server-box{
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    width:300px;
    margin:auto;
}

.ip{
    font-size:20px;
    margin:10px 0;
    color:#38bdf8;
}

button{
    background:#38bdf8;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

footer{
    margin-top:80px;
    padding:20px;
    opacity:0.6;
}
</style>
</head>

<body>

<header>
<h1>🎮 My Minecraft Server</h1>
<p>친구들과 함께하는 마인크래프트 서버</p>
</header>

<div class="server-box">
<h2>서버 접속</h2>
<div class="ip"></div>
<button onclick="copyIP()">IP 복사</button>
</div>

<footer>
<p>© 2026 My Server</p>
</footer>

<script>
function copyIP(){
navigator.clipboard.writeText("14.5.42.34");
alert("IP가 복사되었습니다!");
}
</script>

</body>
</html>
